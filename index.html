<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f7d7e6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Happy Birthday ❤️</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <style>
    :root{
      --bg1:#ffd6e6;   /* light pink */
      --bg2:#ffe9f3;   /* lighter pink */
      --bg3:#fff3f8;   /* almost white pink */
      --card: rgba(255,255,255,.70);
      --text:#1b1020;
      --muted:#4b2a3f;
      --border: rgba(27,16,32,.12);
      --glass: rgba(255,255,255,.55);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      color:var(--text);

      /* Soft light pink background */
      background:
        radial-gradient(1200px 700px at 15% -10%, rgba(255,120,190,.30), transparent 60%),
        radial-gradient(900px 600px at 110% 10%, rgba(255,200,230,.55), transparent 55%),
        radial-gradient(700px 500px at 30% 120%, rgba(255,170,220,.25), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg3));

      /* Safe areas for iPhone notches */
      padding:
        calc(14px + env(safe-area-inset-top))
        calc(14px + env(safe-area-inset-right))
        calc(14px + env(safe-area-inset-bottom))
        calc(14px + env(safe-area-inset-left));
    }

    .wrap{ max-width: 820px; margin: 0 auto; }
    .card{
      border-radius: 24px;
      overflow:hidden;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 55px rgba(0,0,0,.18);
    }

    /* HERO: show FULL image (contain). Use a blurred cover background behind it */
    .hero{
      position: relative;
      width: 100%;
      height: clamp(280px, 42vh, 460px);
      background: rgba(255,255,255,.25);
      overflow:hidden;
    }
    .hero .bg{
      position:absolute; inset:0;
      background-position:center;
      background-size: cover;
      filter: blur(18px) saturate(1.05);
      transform: scale(1.08);
      opacity: .55;
    }
    .hero .shade{
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(255,255,255,.00), rgba(255,230,242,.55));
      pointer-events:none;
    }
    .hero img{
      position: relative;
      z-index: 2;
      width:100%;
      height:100%;
      object-fit: contain; /* FULL image visible */
      display:block;
    }

    .content{ padding: 18px; }
    .title{
      margin: 4px 0 10px;
      font-size: clamp(22px, 2.6vw, 28px);
      letter-spacing: .2px;
    }
    .subtitle{
      margin: 0 0 14px;
      color: rgba(75,42,63,.85);
      font-size: 13px;
      line-height: 1.35;
    }

    .message{
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 16px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.55);
    }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top: 12px;
    }
    button{
      border:0;
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 700;
      cursor:pointer;
      background: rgba(255,255,255,.60);
      color: var(--text);
      box-shadow: 0 8px 22px rgba(0,0,0,.06);
    }
    button.primary{
      background: linear-gradient(135deg, rgba(255,79,216,1), rgba(255,195,230,1));
      color:#1b1020;
    }
    button:active{ transform: translateY(1px); }

    .hint{
      margin-top: 12px;
      font-size: 12px;
      color: rgba(75,42,63,.85);
      opacity:.95;
    }

    .toolbar{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:10px;
      margin-top: 10px;
      color: rgba(75,42,63,.85);
      font-size: 12px;
    }
    .dots{
      display:flex; gap:6px; align-items:center;
    }
    .dot{
      width:7px; height:7px; border-radius:999px;
      background: rgba(27,16,32,.25);
    }
    .dot.active{
      background: rgba(27,16,32,.65);
    }

    canvas.confetti{ position:fixed; inset:0; pointer-events:none; z-index:999; }
  </style>
</head>

<body>
  <canvas class="confetti" id="confetti"></canvas>

  <div class="wrap">
    <div class="card" id="card">
      <div class="hero" id="hero">
        <div class="bg" id="heroBg"></div>
        <img id="heroImg" src="./assets/hero-1.jpg" alt="Photo" />
        <div class="shade"></div>
      </div>

      <div class="content">
        <div class="title">Happy Birthday, my love ❤️</div>
        <div class="subtitle">
          Swipe the photo left/right to change it. Tap “Next message” for more wishes.
        </div>

        <div class="message" id="message"></div>

        <div class="btns">
          <button class="primary" id="nextMsgBtn">Next message ✨</button>
          <button id="prevPhotoBtn">← Photo</button>
          <button id="nextPhotoBtn">Photo →</button>
          <button id="copyBtn">Copy</button>
          <button id="shareBtn">Share</button>
        </div>

        <div class="toolbar">
          <div id="photoLabel">Photo 1 / 3</div>
          <div class="dots" id="dots"></div>
        </div>

        <div class="hint" id="pwaHint" style="display:none;">
          iPhone tip: open in Safari → Share → <b>Add to Home Screen</b>.
        </div>
      </div>
    </div>
  </div>

  <script>
    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try { await navigator.serviceWorker.register('./sw.js'); } catch (e) {}
      });
    }

    // PWA hint for iOS
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isIOS && !isStandalone) document.getElementById('pwaHint').style.display = 'block';

    // --- Photos (add as many as you want) ---
    const PHOTOS = [
      './assets/hero-1.jpeg',
      './assets/hero-2.jpeg',
      './assets/hero-3.jpeg',
      './assets/hero-4.jpeg'
    ];
    PHOTOS.forEach(src => { const i = new Image(); i.src = src; });

    // --- Romantic wishes (edit freely) ---
    const MESSAGES = [
`Happy birthday, my love ❤️
I wish you a year that feels gentle and bright — full of calm mornings, warm evenings, and reasons to smile.
May you feel loved, chosen, and adored every single day.`,

`Today I’m wishing you the kind of happiness that stays.
May your dreams feel closer, your heart feel lighter, and your world feel softer.
You deserve beautiful things — and you are one of them.`,

`Happy birthday, my favorite person.
May life treat you kindly, may luck find you often, and may you always feel proud of who you are.
I’m cheering for you in everything — always.`,

`I wish you love that feels safe, joy that feels real, and days that feel like home.
May this year bring you surprises that make you laugh and moments you’ll want to keep forever.`,

`On your birthday, I’m wishing you:
✨ health and peace
✨ confidence and glow
✨ adventures and sweet memories
✨ and a love that never runs out (mine).`,

`Happy birthday, sweetheart.
May every day give you something small and wonderful — a good song, a warm message, a perfect coffee, a kind look.
And may you always remember: you’re deeply loved.`,

`If I could give you one thing, it would be the way you make me feel — safe, inspired, and happy.
But since I can’t wrap that in a box… I’ll give you my time, my care, and my love — every day.`
    ];

    const heroImg = document.getElementById('heroImg');
    const heroBg = document.getElementById('heroBg');
    const messageEl = document.getElementById('message');
    const nextMsgBtn = document.getElementById('nextMsgBtn');
    const prevPhotoBtn = document.getElementById('prevPhotoBtn');
    const nextPhotoBtn = document.getElementById('nextPhotoBtn');
    const copyBtn = document.getElementById('copyBtn');
    const shareBtn = document.getElementById('shareBtn');
    const photoLabel = document.getElementById('photoLabel');
    const dotsEl = document.getElementById('dots');
    const hero = document.getElementById('hero');

    // Dots UI
    function renderDots(activeIdx) {
      dotsEl.innerHTML = '';
      PHOTOS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === activeIdx ? ' active' : '');
        dotsEl.appendChild(d);
      });
    }

    // Photo switching
    let photoIdx = 0;
    function setPhoto(idx) {
      photoIdx = (idx + PHOTOS.length) % PHOTOS.length;
      const src = PHOTOS[photoIdx];
      heroImg.src = src;
      heroBg.style.backgroundImage = `url("${src}")`;
      photoLabel.textContent = `Photo ${photoIdx + 1} / ${PHOTOS.length}`;
      renderDots(photoIdx);
      burst(); // celebration on change
    }

    prevPhotoBtn.addEventListener('click', () => setPhoto(photoIdx - 1));
    nextPhotoBtn.addEventListener('click', () => setPhoto(photoIdx + 1));

    // Swipe on hero to change photo
    let startX = null;
    hero.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    }, { passive: true });

    hero.addEventListener('touchend', (e) => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const dx = endX - startX;
      startX = null;
      if (Math.abs(dx) < 30) return;
      if (dx < 0) setPhoto(photoIdx + 1);
      else setPhoto(photoIdx - 1);
    });

    // Message switching (random but not repeating immediately)
    function pickRandom(exceptIndex) {
      if (MESSAGES.length === 1) return { idx: 0, text: MESSAGES[0] };
      let idx;
      do { idx = Math.floor(Math.random() * MESSAGES.length); }
      while (idx === exceptIndex);
      return { idx, text: MESSAGES[idx] };
    }

    let msgIdx = -1;
    function setMessage() {
      const chosen = pickRandom(msgIdx);
      msgIdx = chosen.idx;
      messageEl.textContent = chosen.text;
      burst();
    }
    nextMsgBtn.addEventListener('click', setMessage);

    // Copy / Share
    copyBtn.addEventListener('click', async () => {
      const text = messageEl.textContent.trim();
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'Copied ✅';
        setTimeout(() => copyBtn.textContent = 'Copy', 1000);
      } catch {
        alert('Could not copy automatically. Please select the text and copy.');
      }
    });

    shareBtn.addEventListener('click', async () => {
      const text = messageEl.textContent.trim();
      if (navigator.share) {
        try { await navigator.share({ title: 'Happy Birthday', text }); } catch {}
      } else {
        alert('Share is not supported here. Use Copy instead.');
      }
    });

    // --- Emoji particles (no libs) ---
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');

    // Emojis vibe (edit freely)
    const EMOJIS = ['🎂','✨','🎉','💖','🌸'];

    let pieces = [];

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function burst() {
      const count = 42; // fewer looks nicer with emoji
      const originX = window.innerWidth - 28;  // right-bottom corner
      const originY = window.innerHeight - 28;

      pieces = [];
      for (let i = 0; i < count; i++) {
        const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        const size = 18 + Math.random() * 14;

        // Mostly going up/left (from bottom-right)
        const angle = Math.random() * Math.PI * 0.75 + Math.PI;
        const speed = 5 + Math.random() * 8;

        pieces.push({
          emoji,
          x: originX,
          y: originY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          g: 0.20 + Math.random() * 0.10,
          rot: (Math.random() - 0.5) * 0.2,
          a: 1,
          size,
          spin: (Math.random() - 0.5) * 0.25
        });
      }
      requestAnimationFrame(tick);
    }

    function tick() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      let alive = 0;
      for (const p of pieces) {
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.spin;
        p.a -= 0.012;

        if (p.a > 0 && p.y < window.innerHeight + 80) alive++;

        ctx.save();
        ctx.globalAlpha = Math.max(p.a, 0);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);

        ctx.font = `${p.size}px Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.emoji, 0, 0);

        ctx.restore();
      }

      if (alive > 0) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    // Init
    setPhoto(0);
    setMessage();
  </script>
</body>
</html>
