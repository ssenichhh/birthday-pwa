<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Happy Birthday ❤️</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <style>
    :root { --bg:#0b0b10; --card:#141421; --text:#f2f2f7; --muted:#b6b6c7; }
    * { box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(255,79,216,.26), transparent 60%),
        radial-gradient(900px 600px at 110% 10%, rgba(116,119,255,.18), transparent 55%),
        var(--bg);
      color:var(--text);
      padding: 18px;
    }
    .wrap{ max-width:760px; margin:0 auto; }
    .card{
      background: rgba(20,20,33,.86);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      overflow:hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .hero{
      position:relative;
      width:100%;
      height: 320px;
      background: #0b0b10;
    }
    @media (max-width:520px){ .hero{ height: 260px; } }
    .hero img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      filter: saturate(1.05) contrast(1.02);
    }
    .hero::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(0,0,0,.0), rgba(11,11,16,.55));
      pointer-events:none;
    }
    .content{ padding: 16px; }
    .title{
      margin: 2px 0 10px;
      font-size: 22px;
      letter-spacing: .2px;
    }
    .subtitle{
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .message{
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 16px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
    }
    .btns{
      display:flex; flex-wrap:wrap; gap:10px;
      margin-top: 12px;
    }
    button{
      border:0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 600;
      cursor:pointer;
      background: rgba(255,255,255,.10);
      color: var(--text);
    }
    button.primary{
      background: linear-gradient(135deg, rgba(255,79,216,1), rgba(116,119,255,1));
      color:#0b0b10;
    }
    button:active{ transform: translateY(1px); }

    .hint{
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      opacity:.95;
    }
    canvas.confetti{ position:fixed; inset:0; pointer-events:none; z-index:999; }
  </style>
</head>

<body>
  <canvas class="confetti" id="confetti"></canvas>

  <div class="wrap">
    <div class="card">
      <div class="hero">
        <!-- Replace this file to change the photo -->
        <img src="./assets/hero.jpg" alt="Photo" />
      </div>

      <div class="content">
        <div class="title">Happy Birthday, my love ❤️</div>
        <div class="subtitle">
          A tiny page that holds a big feeling.
          (Add to Home Screen in Safari to make it look like an app.)
        </div>

        <div class="message" id="message"></div>

        <div class="btns">
          <button class="primary" id="nextBtn">Next cute message ✨</button>
          <button id="copyBtn">Copy</button>
          <button id="shareBtn">Share</button>
        </div>

        <div class="hint" id="pwaHint" style="display:none;">
          iPhone tip: open in Safari → Share → <b>Add to Home Screen</b>.
        </div>
      </div>
    </div>
  </div>

  <script>
    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try { await navigator.serviceWorker.register('./sw.js'); } catch (e) {}
      });
    }

    // PWA hint for iOS
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isIOS && !isStandalone) document.getElementById('pwaHint').style.display = 'block';

    // Hardcoded romantic messages (edit freely)
    const MESSAGES = [
`Today is your day — and I hope it feels soft, warm, and beautiful… like you.
Thank you for being you. I’m so lucky to love you.`,

`Happy birthday, my favorite person.
I love the way you laugh, the way you care, and the way you make everything feel lighter.
You deserve the sweetest year.`,

`If I could, I’d wrap every good thing in the world and give it to you.
But for now: my time, my love, my attention — always yours.`,

`You’re not just amazing — you’re *my* amazing.
Happy birthday, love. Let’s make this year unforgettable.`,

`I hope you feel adored today.
Because you are — more than words, more than gifts, more than any page like this can say.`,

`You make ordinary days feel like home.
Happy birthday, my love. I’m proud to be by your side.`
    ];

    const messageEl = document.getElementById('message');
    const nextBtn = document.getElementById('nextBtn');
    const copyBtn = document.getElementById('copyBtn');
    const shareBtn = document.getElementById('shareBtn');

    function pickRandom(exceptIndex) {
      if (MESSAGES.length === 1) return { idx: 0, text: MESSAGES[0] };
      let idx;
      do { idx = Math.floor(Math.random() * MESSAGES.length); }
      while (idx === exceptIndex);
      return { idx, text: MESSAGES[idx] };
    }

    let currentIdx = -1;
    function setMessage(random = true) {
      const chosen = random ? pickRandom(currentIdx) : { idx: 0, text: MESSAGES[0] };
      currentIdx = chosen.idx;
      messageEl.textContent = chosen.text;
      burst();
    }

    // Confetti (tiny, no libs)
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let pieces = [];

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }
    window.addEventListener('resize', resize); resize();

    function burst() {
      const count = 120;
      pieces = [];
      for (let i=0;i<count;i++){
        pieces.push({
          x: window.innerWidth/2,
          y: window.innerHeight*0.18,
          vx: (Math.random()-0.5)*10,
          vy: Math.random()*-8 - 6,
          g: 0.22 + Math.random()*0.12,
          r: 3 + Math.random()*4,
          a: 1
        });
      }
      requestAnimationFrame(tick);
    }

    function tick(){
      ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
      let alive = 0;
      for (const p of pieces){
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.a -= 0.007;
        if (p.a > 0 && p.y < window.innerHeight + 40) alive++;
        ctx.globalAlpha = Math.max(p.a, 0);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (alive > 0) requestAnimationFrame(tick);
      else ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    }

    nextBtn.addEventListener('click', () => setMessage(true));

    copyBtn.addEventListener('click', async () => {
      const text = messageEl.textContent.trim();
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'Copied ✅';
        setTimeout(() => copyBtn.textContent = 'Copy', 1000);
      } catch {
        alert('Could not copy automatically. Please select the text and copy.');
      }
    });

    shareBtn.addEventListener('click', async () => {
      const text = messageEl.textContent.trim();
      if (navigator.share) {
        try { await navigator.share({ title: 'Happy Birthday', text }); } catch {}
      } else {
        alert('Share is not supported here. Use Copy instead.');
      }
    });

    // First message on load
    setMessage(true);
  </script>
</body>
</html>
